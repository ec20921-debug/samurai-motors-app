<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samurai Motors - ホーム</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --text: #e8e8e8;
  --text-dim: #888;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans Khmer','Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  text-align:center;
  padding: 30px 16px 20px;
}
.logo {
  width:72px; height:72px; border-radius:18px;
  overflow:hidden; margin:0 auto 12px;
  box-shadow: 0 4px 20px rgba(201,168,76,0.2);
}
.logo img { width:100%; height:100%; object-fit:cover; }
.header h1 {
  font-size:20px; letter-spacing:1px;
  background: linear-gradient(135deg, var(--gold), #e8d5a3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p { font-size:12px; color:var(--text-dim); margin-top:4px; }

.menu-grid {
  padding: 0 16px 40px;
  max-width:480px; margin:0 auto;
  display:flex; flex-direction:column; gap:10px;
}

.menu-item {
  display:flex; align-items:center; gap:14px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px;
  text-decoration:none; color:var(--text);
  transition: all 0.2s;
  cursor:pointer;
}
.menu-item:active {
  transform:scale(0.98);
  border-color: var(--gold);
}

.menu-icon {
  width:48px; height:48px;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; flex-shrink:0;
}

.menu-info { flex:1; }
.menu-title {
  font-size:15px; font-weight:700; margin-bottom:2px;
}
.menu-desc {
  font-size:11px; color:var(--text-dim); line-height:1.4;
}

.menu-arrow {
  color:var(--text-dim); font-size:18px;
}

/* アイコン背景色 */
.icon-wash { background: linear-gradient(135deg, #1565C0, #1E88E5); }
.icon-attendance { background: linear-gradient(135deg, #00695C, #00897B); }
.icon-report { background: linear-gradient(135deg, #6A1B9A, #8E24AA); }
.icon-task { background: linear-gradient(135deg, #E65100, #F57C00); }
.icon-expense { background: linear-gradient(135deg, #2E7D32, #43A047); }

.section-label {
  font-size:11px; font-weight:600; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:1px;
  padding: 16px 0 8px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><img src="logo.png" alt="Samurai Motors"></div>
  <h1>SAMURAI MOTORS</h1>
  <p>業務管理システム / ប្រព័ន្ធគ្រប់គ្រងការងារ</p>
</div>

<div class="menu-grid">

  <div class="section-label">📋 現場業務 / ការងារទូទៅ</div>

  <a class="menu-item" id="menuWash">
    <div class="menu-icon icon-wash">🚗</div>
    <div class="menu-info">
      <div class="menu-title">洗車登録 / ចុះឈ្មោះលាងឡាន</div>
      <div class="menu-desc">顧客情報・写真・プラン登録</div>
    </div>
    <span class="menu-arrow">›</span>
  </a>

  <a class="menu-item" id="menuAttendance">
    <div class="menu-icon icon-attendance">🕐</div>
    <div class="menu-info">
      <div class="menu-title">勤怠打刻 / ចុះវត្តមាន</div>
      <div class="menu-desc">出勤・退勤をワンタップ記録</div>
    </div>
    <span class="menu-arrow">›</span>
  </a>

  <a class="menu-item" id="menuReport">
    <div class="menu-icon icon-report">📝</div>
    <div class="menu-info">
      <div class="menu-title">日報入力 / របាយការណ៍ប្រចាំថ្ងៃ</div>
      <div class="menu-desc">洗車以外の業務・連絡事項</div>
    </div>
    <span class="menu-arrow">›</span>
  </a>

  <div class="section-label">⚙️ 管理 / គ្រប់គ្រង</div>

  <a class="menu-item" id="menuTask">
    <div class="menu-icon icon-task">📋</div>
    <div class="menu-info">
      <div class="menu-title">タスク管理 / គ្រប់គ្រងការងារ</div>
      <div class="menu-desc">タスクの作成・編集・進捗管理</div>
    </div>
    <span class="menu-arrow">›</span>
  </a>

  <a class="menu-item" id="menuExpense">
    <div class="menu-icon icon-expense">💰</div>
    <div class="menu-info">
      <div class="menu-title">経費入力 / បញ្ចូលការចំណាយ</div>
      <div class="menu-desc">レシート写真・経費記録</div>
    </div>
    <span class="menu-arrow">›</span>
  </a>

</div>

<script>
// GAS URLをTelegramから取得
var GAS_URL = '';
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();

  if (Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.start_param) {
    GAS_URL = decodeURIComponent(Telegram.WebApp.initDataUnsafe.start_param);
  }
}

// 各ミニアプリのベースURL
var BASE = window.location.href.replace(/\/[^\/]*$/, '');

// GAS URLをクエリパラメータとして渡す
function buildUrl(page) {
  var url = BASE + '/' + page;
  if (GAS_URL) {
    url += '?gas=' + encodeURIComponent(GAS_URL);
  }
  return url;
}

document.getElementById('menuWash').href = buildUrl('job-manager.html');
document.getElementById('menuAttendance').href = buildUrl('attendance.html');
document.getElementById('menuReport').href = buildUrl('daily-report.html');
document.getElementById('menuTask').href = buildUrl('task-manager.html');
document.getElementById('menuExpense').href = buildUrl('expense-entry.html');
</script>
</body>
</html>
