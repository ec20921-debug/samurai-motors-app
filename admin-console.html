<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samurai Motors - 管理コンソール</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --gold-soft: rgba(201,168,76,0.12);
  --text: #e8e8e8;
  --text-dim: #888;
  --text-label: #bbb;
  --success: #2ecc71;
  --success-bg: rgba(46,204,113,0.12);
  --danger: #e74c3c;
  --danger-bg: rgba(231,76,60,0.12);
  --blue: #3498db;
  --blue-bg: rgba(52,152,219,0.12);
  --orange: #f39c12;
  --orange-bg: rgba(243,156,18,0.12);
  --purple: #9b59b6;
  --purple-bg: rgba(155,89,182,0.12);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans JP','Noto Sans Khmer', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 70px;
}

/* ヘッダー */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
}
.header-title {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold), #e8d5a3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-date { font-size: 11px; color: var(--text-dim); margin-left: auto; }

/* タブバー */
.tab-bar {
  display: flex; gap: 6px; padding: 10px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: var(--bg);
  position: sticky; top: 49px; z-index: 99;
  border-bottom: 1px solid var(--border);
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-pill {
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  white-space: nowrap; cursor: pointer;
  background: var(--card); color: var(--text-dim);
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.tab-pill.active {
  background: var(--gold); color: #000;
  border-color: var(--gold);
}

/* コンテンツ */
.container { max-width: 480px; margin: 0 auto; padding: 0 16px; }
.view { display: none; }
.view.active { display: block; }

/* ダッシュボード */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin: 14px 0;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.stat-card:active { border-color: var(--gold); }
.stat-icon { font-size: 20px; margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.stat-card.gold { border-color: rgba(201,168,76,0.3); background: var(--gold-soft); }
.stat-card.green { border-color: rgba(46,204,113,0.3); background: var(--success-bg); }
.stat-card.red { border-color: rgba(231,76,60,0.3); background: var(--danger-bg); }
.stat-card.blue { border-color: rgba(52,152,219,0.3); background: var(--blue-bg); }

/* アラートバナー */
.alert-banner {
  background: var(--danger-bg);
  border: 1px solid rgba(231,76,60,0.3);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin: 10px 0;
  font-size: 13px;
}
.alert-banner .alert-title { font-weight: 700; color: var(--danger); margin-bottom: 4px; }

/* セクションヘッダー */
.section-header {
  font-size: 13px; font-weight: 700;
  color: var(--text-dim);
  padding: 16px 0 8px;
  display: flex; align-items: center; gap: 6px;
}

/* 汎用カード */
.item-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.item-card:active { transform: scale(0.99); }
.item-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
}
.item-title { font-size: 14px; font-weight: 700; flex: 1; }
.item-sub { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
.item-meta { font-size: 11px; color: var(--text-dim); }

/* バッジ */
.badge {
  display: inline-block; padding: 2px 8px;
  border-radius: 10px; font-size: 10px; font-weight: 700;
}
.badge-overdue { background: var(--danger-bg); color: var(--danger); }
.badge-today { background: var(--orange-bg); color: var(--orange); }
.badge-pending { background: var(--blue-bg); color: var(--blue); }
.badge-done { background: var(--success-bg); color: var(--success); }
.badge-unpaid { background: var(--danger-bg); color: var(--danger); }
.badge-paid { background: var(--success-bg); color: var(--success); }
.badge-unanswered { background: var(--orange-bg); color: var(--orange); }
.badge-answered { background: var(--success-bg); color: var(--success); }

/* タスク作成モーダル */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 300;
  justify-content: center; align-items: flex-end;
}
.modal-overlay.show { display: flex; }
.modal-content {
  background: var(--card); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 480px; max-height: 85vh;
  padding: 20px 16px; overflow-y: auto;
}
.modal-title {
  font-size: 16px; font-weight: 700; margin-bottom: 16px;
  text-align: center;
}
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-label); margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%; padding: 11px 14px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 14px; font-family: inherit;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--gold);
}
.field textarea { resize: vertical; min-height: 80px; }

/* ボタン */
.btn {
  display: block; width: 100%; padding: 13px;
  border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: opacity 0.2s;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--gold); color: #000; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-row { display: flex; gap: 10px; margin-top: 16px; }
.btn-row .btn { flex: 1; }

/* FAB */
.fab {
  position: fixed; bottom: 20px; right: 20px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--gold); color: #000;
  border: none; font-size: 28px; font-weight: 700;
  box-shadow: 0 4px 16px rgba(201,168,76,0.4);
  cursor: pointer; z-index: 200;
  display: flex; align-items: center; justify-content: center;
}

/* ローディング */
.loading {
  display: flex; flex-direction: column;
  align-items: center; padding: 60px 20px;
  color: var(--text-dim); gap: 12px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-dim); font-size: 13px;
}

/* トースト */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 20px;
  border-radius: 8px; font-size: 13px; z-index: 400;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* 勤怠テーブル */
.att-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.att-table th {
  text-align: left; padding: 8px 6px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim); font-weight: 600;
}
.att-table td {
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
}

/* フィルター */
.filter-row {
  display: flex; gap: 8px; margin: 10px 0;
  align-items: center;
}
.filter-row select, .filter-row input {
  padding: 8px 10px; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 12px; font-family: inherit;
  flex: 1;
}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:20px">⚙️</span>
  <span class="header-title">管理コンソール</span>
  <span class="header-date" id="headerDate"></span>
</div>

<div class="tab-bar" id="tabBar">
  <div class="tab-pill active" data-tab="dashboard">📊 概要</div>
  <div class="tab-pill" data-tab="tasks">📋 タスク</div>
  <div class="tab-pill" data-tab="expenses">💰 経費</div>
  <div class="tab-pill" data-tab="attendance">🕐 勤怠</div>
  <div class="tab-pill" data-tab="reports">📝 日報</div>
  <div class="tab-pill" data-tab="inquiries">💬 問合せ</div>
</div>

<div class="container">

  <!-- ===== ダッシュボード ===== -->
  <div class="view active" id="view-dashboard">
    <div id="dashLoading" class="loading"><div class="spinner"></div>読み込み中...</div>
    <div id="dashContent" style="display:none">
      <div class="stats-grid" id="statsGrid"></div>
      <div id="alertArea"></div>
      <div class="section-header">📋 アクションが必要なタスク</div>
      <div id="dashTasks"></div>
    </div>
  </div>

  <!-- ===== タスク管理 ===== -->
  <div class="view" id="view-tasks">
    <div class="filter-row">
      <select id="taskFilter">
        <option value="active">未完了</option>
        <option value="all">すべて</option>
        <option value="completed">完了済み</option>
        <option value="overdue">期限超過</option>
      </select>
      <select id="taskAssigneeFilter">
        <option value="">全員</option>
      </select>
    </div>
    <div id="taskLoading" class="loading"><div class="spinner"></div></div>
    <div id="taskList"></div>
  </div>

  <!-- ===== 経費管理 ===== -->
  <div class="view" id="view-expenses">
    <div class="filter-row">
      <select id="expenseFilter">
        <option value="all">すべて</option>
        <option value="unpaid">未精算</option>
        <option value="paid">精算済み</option>
      </select>
      <input type="date" id="expenseDateFilter">
    </div>
    <div id="expenseSummaryBar" style="display:none"></div>
    <div id="expenseLoading" class="loading"><div class="spinner"></div></div>
    <div id="expenseList"></div>
  </div>

  <!-- ===== 勤怠管理 ===== -->
  <div class="view" id="view-attendance">
    <div class="filter-row">
      <input type="date" id="attDateFilter">
      <select id="attStaffFilter">
        <option value="">全員</option>
      </select>
    </div>
    <div id="attLoading" class="loading"><div class="spinner"></div></div>
    <div id="attContent"></div>
  </div>

  <!-- ===== 日報 ===== -->
  <div class="view" id="view-reports">
    <div class="filter-row">
      <input type="date" id="reportDateFilter">
    </div>
    <div id="reportLoading" class="loading"><div class="spinner"></div></div>
    <div id="reportList"></div>
  </div>

  <!-- ===== 問い合わせ ===== -->
  <div class="view" id="view-inquiries">
    <div class="filter-row">
      <select id="inquiryFilter">
        <option value="unanswered">未対応</option>
        <option value="all">すべて</option>
        <option value="answered">対応済み</option>
      </select>
    </div>
    <div id="inquiryLoading" class="loading"><div class="spinner"></div></div>
    <div id="inquiryList"></div>
  </div>

</div>

<!-- タスク作成FAB（タスクタブのみ表示） -->
<button class="fab" id="fabNewTask" style="display:none" onclick="openTaskModal()">＋</button>

<!-- タスク作成/編集モーダル -->
<div class="modal-overlay" id="taskModal">
  <div class="modal-content">
    <div class="modal-title" id="taskModalTitle">タスク作成</div>
    <input type="hidden" id="editTaskId">
    <div class="field">
      <label>担当者</label>
      <select id="taskAssignee">
        <option value="">選択してください</option>
      </select>
    </div>
    <div class="field">
      <label>期限</label>
      <input type="date" id="taskDeadline">
    </div>
    <div class="field">
      <label>やるべきこと</label>
      <textarea id="taskDescription" placeholder="タスクの内容を入力"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeTaskModal()">キャンセル</button>
      <button class="btn btn-primary" id="btnSaveTask" onclick="saveTask()">作成</button>
    </div>
  </div>
</div>

<!-- 問い合わせ返信モーダル -->
<div class="modal-overlay" id="replyModal">
  <div class="modal-content">
    <div class="modal-title">返信</div>
    <input type="hidden" id="replyInquiryId">
    <div id="replyOriginalMsg" style="font-size:13px;color:var(--text-dim);margin-bottom:14px;padding:10px;background:var(--bg);border-radius:8px;"></div>
    <div class="field">
      <label>返信内容</label>
      <textarea id="replyText" placeholder="返信メッセージを入力"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeReplyModal()">キャンセル</button>
      <button class="btn btn-primary" id="btnSendReply" onclick="sendReply()">送信</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 初期化 ──
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxJfqfid10yT_gRxzUb01qoN_RUVr6AcMuKzVpE7w3_cZoDKNewnBjKO4DO96LPA1hh/exec';
var currentTab = 'dashboard';
var allTasks = [];
var allExpenses = [];
var allAttendance = [];
var allReports = [];
var allInquiries = [];

// スタッフ情報（GASのSTAFF_REGISTRYに対応）
var STAFF = [
  { name: 'ロン', chatId: '7500384947' }
];

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.start_param) {
    GAS_URL = decodeURIComponent(Telegram.WebApp.initDataUnsafe.start_param);
  }
}
// URLパラメータからGAS_URL取得
var urlParams = new URLSearchParams(window.location.search);
var gasParam = urlParams.get('gas');
if (gasParam) GAS_URL = gasParam;

// タブパラメータで初期表示を切替
var tabParam = urlParams.get('tab');

// 今日の日付（カンボジア時間）
function getCambodiaToday() {
  var now = new Date();
  var utc = now.getTime() + now.getTimezoneOffset() * 60000;
  var kh = new Date(utc + 7 * 3600000);
  var y = kh.getFullYear();
  var m = String(kh.getMonth() + 1).padStart(2, '0');
  var d = String(kh.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}
var TODAY = getCambodiaToday();
document.getElementById('headerDate').textContent = TODAY;

// ── タブ切替 ──
document.querySelectorAll('.tab-pill').forEach(function(pill) {
  pill.addEventListener('click', function() {
    switchTab(this.dataset.tab);
  });
});

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.tab === tab);
  });
  document.querySelectorAll('.view').forEach(function(v) {
    v.classList.toggle('active', v.id === 'view-' + tab);
  });
  // タスクタブならFAB表示
  document.getElementById('fabNewTask').style.display = (tab === 'tasks') ? 'flex' : 'none';
  // データ取得
  loadTabData(tab);
}

// ── データ取得 ──
var loadedTabs = {};
function loadTabData(tab, force) {
  if (loadedTabs[tab] && !force) return;
  loadedTabs[tab] = true;
  switch(tab) {
    case 'dashboard': loadDashboard(); break;
    case 'tasks': loadTasks(); break;
    case 'expenses': loadExpenses(); break;
    case 'attendance': loadAttendance(); break;
    case 'reports': loadReports(); break;
    case 'inquiries': loadInquiries(); break;
  }
}

// ── ダッシュボード ──
function loadDashboard() {
  show('dashLoading'); hide('dashContent');
  // 全データを並列取得
  Promise.all([
    fetchApi('tasks'),
    fetchApi('expenses'),
    fetchApi('attendance'),
    fetchApi('inquiries')
  ]).then(function(results) {
    allTasks = results[0] || [];
    allExpenses = results[1] || [];
    allAttendance = results[2] || [];
    allInquiries = results[3] || [];
    renderDashboard();
    hide('dashLoading'); show('dashContent');
  }).catch(function(err) {
    console.error(err);
    document.getElementById('dashLoading').innerHTML = '<div class="empty-state">データ取得に失敗しました</div>';
  });
}

function renderDashboard() {
  // 売上集計（今日の完了ジョブ — 将来拡張用、現在はタスク/経費中心）
  var activeTasks = allTasks.filter(function(t) { return t.status !== '完了'; });
  var overdueTasks = allTasks.filter(function(t) {
    return t.status !== '完了' && t.deadline && t.deadline < TODAY;
  });
  var todayTasks = allTasks.filter(function(t) {
    return t.status !== '完了' && t.deadline === TODAY;
  });

  // 経費集計
  var unpaidExpenses = allExpenses.filter(function(e) { return e.status === '未精算'; });
  var unpaidTotal = 0;
  unpaidExpenses.forEach(function(e) { if (e.currency === 'USD') unpaidTotal += parseFloat(e.amount) || 0; });

  // 勤怠（今日）
  var todayAtt = allAttendance.filter(function(a) { return a.date === TODAY; });
  var workingNow = todayAtt.filter(function(a) { return a.clockIn && !a.clockOut; });

  // 未対応の問い合わせ
  var unanswered = allInquiries.filter(function(i) { return i.status === '未対応'; });

  // 統計カード
  var grid = document.getElementById('statsGrid');
  grid.innerHTML =
    statCard('📋', activeTasks.length, '未完了タスク', activeTasks.length > 0 ? 'gold' : '', 'tasks') +
    statCard('🔴', overdueTasks.length, '期限超過', overdueTasks.length > 0 ? 'red' : '', 'tasks') +
    statCard('💰', '$' + unpaidTotal.toFixed(0), '未精算経費', unpaidExpenses.length > 0 ? 'red' : '', 'expenses') +
    statCard('💬', unanswered.length, '未対応問合せ', unanswered.length > 0 ? 'gold' : '', 'inquiries') +
    statCard('👥', todayAtt.length, '今日の出勤', '', 'attendance') +
    statCard('⏰', workingNow.length, '現在勤務中', workingNow.length > 0 ? 'green' : '', 'attendance');

  // クリックでタブ切替
  grid.querySelectorAll('.stat-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var target = this.dataset.tab;
      if (target) switchTab(target);
    });
  });

  // アラート
  var alertArea = document.getElementById('alertArea');
  alertArea.innerHTML = '';
  if (overdueTasks.length > 0) {
    alertArea.innerHTML += '<div class="alert-banner"><div class="alert-title">⚠️ 期限超過タスク: ' + overdueTasks.length + '件</div>'
      + overdueTasks.map(function(t) { return '<div style="font-size:12px;margin-top:4px">• ' + esc(t.assignee) + ': ' + esc(t.description) + '（' + t.deadline + '）</div>'; }).join('')
      + '</div>';
  }
  if (unpaidExpenses.length > 0) {
    alertArea.innerHTML += '<div class="alert-banner"><div class="alert-title">💳 未精算の立替え: ' + unpaidExpenses.length + '件 ($' + unpaidTotal.toFixed(0) + ')</div>'
      + '<div style="font-size:12px;margin-top:4px">経費タブで確認・精算してください</div></div>';
  }

  // 今日のタスク
  var dashTasks = document.getElementById('dashTasks');
  var actionTasks = overdueTasks.concat(todayTasks);
  if (actionTasks.length === 0) {
    dashTasks.innerHTML = '<div class="empty-state">✅ 今日アクションが必要なタスクはありません</div>';
  } else {
    dashTasks.innerHTML = actionTasks.map(function(t) { return renderTaskCard(t); }).join('');
  }
}

function statCard(icon, value, label, colorClass, tab) {
  return '<div class="stat-card ' + colorClass + '" data-tab="' + tab + '">'
    + '<div class="stat-icon">' + icon + '</div>'
    + '<div class="stat-value">' + value + '</div>'
    + '<div class="stat-label">' + label + '</div>'
    + '</div>';
}

// ── タスク ──
function loadTasks() {
  show('taskLoading'); hide('taskList');
  fetchApi('tasks').then(function(data) {
    allTasks = data || [];
    populateAssigneeFilters();
    renderTasks();
    hide('taskLoading');
  });
}

function populateAssigneeFilters() {
  var assignees = {};
  allTasks.forEach(function(t) { if (t.assignee) assignees[t.assignee] = true; });
  var opts = '<option value="">全員</option>';
  Object.keys(assignees).forEach(function(a) {
    opts += '<option value="' + esc(a) + '">' + esc(a) + '</option>';
  });
  document.getElementById('taskAssigneeFilter').innerHTML = opts;
}

function renderTasks() {
  var filter = document.getElementById('taskFilter').value;
  var assignee = document.getElementById('taskAssigneeFilter').value;
  var filtered = allTasks.filter(function(t) {
    if (assignee && t.assignee !== assignee) return false;
    switch(filter) {
      case 'active': return t.status !== '完了';
      case 'completed': return t.status === '完了';
      case 'overdue': return t.status !== '完了' && t.deadline && t.deadline < TODAY;
      default: return true;
    }
  });
  var list = document.getElementById('taskList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">タスクがありません</div>';
    return;
  }
  // 期限超過を先頭にソート
  filtered.sort(function(a, b) {
    if (a.status === '完了' && b.status !== '完了') return 1;
    if (a.status !== '完了' && b.status === '完了') return -1;
    var da = a.deadline || '9999'; var db = b.deadline || '9999';
    return da < db ? -1 : da > db ? 1 : 0;
  });
  list.innerHTML = filtered.map(function(t) { return renderTaskCard(t); }).join('');
  show('taskList');
}

function renderTaskCard(t) {
  var badge = '';
  if (t.status === '完了') {
    badge = '<span class="badge badge-done">完了</span>';
  } else if (t.deadline && t.deadline < TODAY) {
    badge = '<span class="badge badge-overdue">期限超過</span>';
  } else if (t.deadline === TODAY) {
    badge = '<span class="badge badge-today">今日まで</span>';
  } else {
    badge = '<span class="badge badge-pending">未着手</span>';
  }
  var deadlineStr = t.deadline ? t.deadline : '期限なし';
  return '<div class="item-card" onclick="openTaskAction(\'' + esc(t.id) + '\')">'
    + '<div class="item-row">'
    + '<div class="item-title">' + esc(t.description) + '</div>'
    + badge
    + '</div>'
    + '<div class="item-sub">👤 ' + esc(t.assignee) + ' ・ 📅 ' + deadlineStr + '</div>'
    + (t.reason ? '<div class="item-meta">❌ ' + esc(t.reason) + '</div>' : '')
    + '</div>';
}

document.getElementById('taskFilter').addEventListener('change', renderTasks);
document.getElementById('taskAssigneeFilter').addEventListener('change', renderTasks);

function openTaskAction(taskId) {
  var task = allTasks.find(function(t) { return t.id === taskId; });
  if (!task) return;
  if (task.status === '完了') {
    showToast('✅ このタスクは完了済みです');
    return;
  }
  // 簡易アクション：編集モーダルを開く
  document.getElementById('editTaskId').value = taskId;
  document.getElementById('taskModalTitle').textContent = 'タスク編集';
  document.getElementById('taskAssignee').value = task.assigneeChatId || '';
  document.getElementById('taskDeadline').value = task.deadline || '';
  document.getElementById('taskDescription').value = task.description || '';
  document.getElementById('btnSaveTask').textContent = '更新';
  document.getElementById('taskModal').classList.add('show');
}

function openTaskModal() {
  document.getElementById('editTaskId').value = '';
  document.getElementById('taskModalTitle').textContent = 'タスク作成';
  document.getElementById('taskAssignee').value = '';
  document.getElementById('taskDeadline').value = '';
  document.getElementById('taskDescription').value = '';
  document.getElementById('btnSaveTask').textContent = '作成';
  document.getElementById('taskModal').classList.add('show');
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('show');
}

function saveTask() {
  var editId = document.getElementById('editTaskId').value;
  var assigneeChatId = document.getElementById('taskAssignee').value;
  var deadline = document.getElementById('taskDeadline').value;
  var description = document.getElementById('taskDescription').value.trim();

  if (!description) { showToast('内容を入力してください'); return; }

  var selectedStaff = STAFF.find(function(s) { return s.chatId === assigneeChatId; });
  var assigneeName = selectedStaff ? selectedStaff.name : '未割当';

  var btn = document.getElementById('btnSaveTask');
  btn.disabled = true;

  if (editId) {
    // 編集
    postApi('task_edit', {
      taskId: editId,
      assignee: assigneeName,
      assigneeChatId: assigneeChatId,
      deadline: deadline,
      description: description
    }).then(function(res) {
      showToast('✅ タスクを更新しました');
      closeTaskModal();
      loadTasks();
      loadedTabs['dashboard'] = false;
    }).finally(function() { btn.disabled = false; });
  } else {
    // 新規作成
    postApi('task_create', {
      assignee: assigneeName,
      assigneeChatId: assigneeChatId,
      deadline: deadline,
      description: description
    }).then(function(res) {
      showToast('✅ タスクを作成しました');
      closeTaskModal();
      loadTasks();
      loadedTabs['dashboard'] = false;
    }).finally(function() { btn.disabled = false; });
  }
}

// ── 経費 ──
function loadExpenses() {
  show('expenseLoading'); hide('expenseList');
  fetchApi('expenses').then(function(data) {
    allExpenses = data || [];
    renderExpenses();
    hide('expenseLoading');
  });
}

function renderExpenses() {
  var filter = document.getElementById('expenseFilter').value;
  var dateFilter = document.getElementById('expenseDateFilter').value;
  var filtered = allExpenses.filter(function(e) {
    if (filter === 'unpaid' && e.status !== '未精算') return false;
    if (filter === 'paid' && e.status !== '精算済み') return false;
    if (dateFilter && e.date !== dateFilter) return false;
    return true;
  });

  // 集計バー
  var totalUSD = 0, totalKHR = 0, unpaidUSD = 0;
  filtered.forEach(function(e) {
    var amt = parseFloat(e.amount) || 0;
    if (e.currency === 'USD') { totalUSD += amt; if (e.status === '未精算') unpaidUSD += amt; }
    else totalKHR += amt;
  });
  var bar = document.getElementById('expenseSummaryBar');
  bar.style.display = 'block';
  bar.innerHTML = '<div class="item-card" style="padding:10px 14px">'
    + '<div style="display:flex;justify-content:space-between;font-size:13px">'
    + '<span>' + filtered.length + '件</span>'
    + '<span>合計: <b>$' + totalUSD.toFixed(2) + '</b>'
    + (totalKHR > 0 ? ' / ' + totalKHR.toLocaleString() + ' KHR' : '') + '</span>'
    + '</div>'
    + (unpaidUSD > 0 ? '<div style="font-size:11px;color:var(--danger);margin-top:4px">未精算: $' + unpaidUSD.toFixed(2) + '</div>' : '')
    + '</div>';

  var list = document.getElementById('expenseList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">経費データがありません</div>';
    show('expenseList'); return;
  }
  // 新しい順
  filtered.sort(function(a, b) { return (b.created || '').localeCompare(a.created || ''); });
  list.innerHTML = filtered.map(function(e) {
    var badge = e.status === '精算済み'
      ? '<span class="badge badge-paid">精算済</span>'
      : '<span class="badge badge-unpaid">未精算</span>';
    var photoLink = '';
    if (e.photoUrl || (e.photoUrls && e.photoUrls.length > 0)) {
      photoLink = ' 📷';
    }
    return '<div class="item-card">'
      + '<div class="item-row">'
      + '<div class="item-title">' + esc(e.description || '（品目なし）') + photoLink + '</div>'
      + badge
      + '</div>'
      + '<div class="item-sub">'
      + '💵 ' + formatMoney(e.amount) + ' ' + (e.currency || 'USD')
      + ' ・ 📅 ' + (e.date || '-')
      + ' ・ 👤 ' + esc(e.registeredBy || '-')
      + '</div>'
      + (e.vendor ? '<div class="item-meta">🏪 ' + esc(e.vendor) + (e.category ? ' ・ ' + esc(e.category) : '') + '</div>' : '')
      + '</div>';
  }).join('');
  show('expenseList');
}

document.getElementById('expenseFilter').addEventListener('change', renderExpenses);
document.getElementById('expenseDateFilter').addEventListener('change', renderExpenses);

// ── 勤怠 ──
function loadAttendance() {
  show('attLoading'); hide('attContent');
  // デフォルトで今日の日付
  if (!document.getElementById('attDateFilter').value) {
    document.getElementById('attDateFilter').value = TODAY;
  }
  fetchApi('attendance').then(function(data) {
    allAttendance = data || [];
    populateAttStaffFilter();
    renderAttendance();
    hide('attLoading');
  });
}

function populateAttStaffFilter() {
  var staffNames = {};
  allAttendance.forEach(function(a) { if (a.staff) staffNames[a.staff] = true; });
  var opts = '<option value="">全員</option>';
  Object.keys(staffNames).forEach(function(s) {
    opts += '<option value="' + esc(s) + '">' + esc(s) + '</option>';
  });
  document.getElementById('attStaffFilter').innerHTML = opts;
}

function renderAttendance() {
  var dateFilter = document.getElementById('attDateFilter').value;
  var staffFilter = document.getElementById('attStaffFilter').value;
  var filtered = allAttendance.filter(function(a) {
    if (dateFilter && a.date !== dateFilter) return false;
    if (staffFilter && a.staff !== staffFilter) return false;
    return true;
  });

  var content = document.getElementById('attContent');
  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty-state">勤怠データがありません</div>';
    show('attContent'); return;
  }

  // 日付でグループ化
  var byDate = {};
  filtered.forEach(function(a) {
    if (!byDate[a.date]) byDate[a.date] = [];
    byDate[a.date].push(a);
  });

  var html = '';
  Object.keys(byDate).sort().reverse().forEach(function(date) {
    html += '<div class="section-header">📅 ' + date + '</div>';
    html += '<div class="item-card" style="padding:0;overflow:hidden"><table class="att-table">';
    html += '<tr><th>名前</th><th>出勤</th><th>退勤</th><th>勤務</th></tr>';
    byDate[date].forEach(function(a) {
      var workStr = '';
      if (a.workMinutes) {
        var h = Math.floor(a.workMinutes / 60);
        var m = a.workMinutes % 60;
        workStr = h + 'h' + m + 'm';
      } else if (a.clockIn && !a.clockOut) {
        workStr = '<span style="color:var(--success)">勤務中</span>';
      }
      html += '<tr>'
        + '<td><b>' + esc(a.staff) + '</b></td>'
        + '<td>' + (a.clockIn || '-') + '</td>'
        + '<td>' + (a.clockOut || '-') + '</td>'
        + '<td>' + workStr + '</td>'
        + '</tr>';
    });
    html += '</table></div>';
  });
  content.innerHTML = html;
  show('attContent');
}

document.getElementById('attDateFilter').addEventListener('change', renderAttendance);
document.getElementById('attStaffFilter').addEventListener('change', renderAttendance);

// ── 日報 ──
function loadReports() {
  show('reportLoading'); hide('reportList');
  if (!document.getElementById('reportDateFilter').value) {
    document.getElementById('reportDateFilter').value = TODAY;
  }
  fetchApi('daily_reports').then(function(data) {
    allReports = data || [];
    renderReports();
    hide('reportLoading');
  });
}

function renderReports() {
  var dateFilter = document.getElementById('reportDateFilter').value;
  var filtered = allReports.filter(function(r) {
    if (dateFilter && r.reportDate !== dateFilter) return false;
    return true;
  });
  var list = document.getElementById('reportList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">日報データがありません</div>';
    show('reportList'); return;
  }
  filtered.sort(function(a, b) { return (b.timestamp || '').localeCompare(a.timestamp || ''); });
  list.innerHTML = filtered.map(function(r) {
    return '<div class="item-card">'
      + '<div class="item-row">'
      + '<div class="item-title">👤 ' + esc(r.reporter) + '</div>'
      + '<span class="item-meta">' + (r.reportDate || '') + '</span>'
      + '</div>'
      + (r.otherWork ? '<div class="item-sub">🔧 ' + esc(r.otherWork) + '</div>' : '')
      + (r.notes ? '<div class="item-sub">📌 ' + esc(r.notes) + '</div>' : '')
      + '</div>';
  }).join('');
  show('reportList');
}

document.getElementById('reportDateFilter').addEventListener('change', renderReports);

// ── 問い合わせ ──
function loadInquiries() {
  show('inquiryLoading'); hide('inquiryList');
  fetchApi('inquiries').then(function(data) {
    allInquiries = data || [];
    renderInquiries();
    hide('inquiryLoading');
  });
}

function renderInquiries() {
  var filter = document.getElementById('inquiryFilter').value;
  var filtered = allInquiries.filter(function(i) {
    if (filter === 'unanswered') return i.status === '未対応';
    if (filter === 'answered') return i.status === '対応済み';
    return true;
  });
  var list = document.getElementById('inquiryList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">' + (filter === 'unanswered' ? '未対応の問い合わせはありません ✅' : '問い合わせがありません') + '</div>';
    show('inquiryList'); return;
  }
  list.innerHTML = filtered.map(function(i) {
    var badge = i.status === '対応済み'
      ? '<span class="badge badge-answered">対応済</span>'
      : '<span class="badge badge-unanswered">未対応</span>';
    var typeIcon = { text: '💬', photo: '📷', voice: '🎤', document: '📎', sticker: '🏷️' }[i.msgType] || '💬';
    return '<div class="item-card" onclick="openReply(\'' + esc(i.inquiryId) + '\')">'
      + '<div class="item-row">'
      + '<div class="item-title">' + typeIcon + ' ' + esc(i.customerName || '不明') + '</div>'
      + badge
      + '</div>'
      + '<div class="item-sub">' + esc(truncate(i.message || '（メディア）', 80)) + '</div>'
      + '<div class="item-meta">' + (i.created || '') + '</div>'
      + (i.reply ? '<div style="font-size:11px;color:var(--success);margin-top:4px">↩ ' + esc(truncate(i.reply, 50)) + '</div>' : '')
      + '</div>';
  }).join('');
  show('inquiryList');
}

document.getElementById('inquiryFilter').addEventListener('change', renderInquiries);

function openReply(inquiryId) {
  var inq = allInquiries.find(function(i) { return i.inquiryId === inquiryId; });
  if (!inq) return;
  document.getElementById('replyInquiryId').value = inquiryId;
  document.getElementById('replyOriginalMsg').textContent =
    '👤 ' + (inq.customerName || '不明') + '\n' + (inq.message || '（メディア）');
  document.getElementById('replyText').value = inq.reply || '';
  document.getElementById('replyModal').classList.add('show');
}

function closeReplyModal() {
  document.getElementById('replyModal').classList.remove('show');
}

function sendReply() {
  var inquiryId = document.getElementById('replyInquiryId').value;
  var reply = document.getElementById('replyText').value.trim();
  if (!reply) { showToast('返信内容を入力してください'); return; }

  var btn = document.getElementById('btnSendReply');
  btn.disabled = true;
  postApi('inquiry_reply', {
    inquiryId: inquiryId,
    reply: reply,
    replyBy: '飯泉'
  }).then(function(res) {
    showToast('✅ 返信を送信しました');
    closeReplyModal();
    loadInquiries();
    loadedTabs['dashboard'] = false;
  }).finally(function() { btn.disabled = false; });
}

// ── API ──
function fetchApi(action) {
  return fetch(GAS_URL + '?action=' + action)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.status === 'ok') return d.data || d.tasks || d.expenses || d.attendance || d.reports || d.inquiries || [];
      console.error('API error:', d);
      return [];
    })
    .catch(function(err) {
      console.error('Fetch error:', err);
      return [];
    });
}

function postApi(action, data) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.assign({ action: action }, data))
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.status !== 'ok') {
        showToast('エラー: ' + (d.message || '不明'));
      }
      return d;
    })
    .catch(function(err) {
      console.error('Post error:', err);
      showToast('通信エラーが発生しました');
    });
}

// ── ユーティリティ ──
function esc(str) { if (!str) return ''; var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function truncate(str, len) { return str && str.length > len ? str.substring(0, len) + '...' : str || ''; }
function formatMoney(v) { var n = parseFloat(v); return isNaN(n) ? '0' : n.toFixed(2); }
function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// スタッフセレクト初期化
function initStaffSelects() {
  var sel = document.getElementById('taskAssignee');
  STAFF.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.chatId; opt.textContent = s.name;
    sel.appendChild(opt);
  });
}
initStaffSelects();

// 初期タブ（URLパラメータ or デフォルト）
if (tabParam && ['dashboard','tasks','expenses','attendance','reports','inquiries'].indexOf(tabParam) >= 0) {
  switchTab(tabParam);
} else {
  loadTabData('dashboard');
}
</script>
