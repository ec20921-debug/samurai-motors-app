<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samurai Motors - ស្តុកទំនិញ（在庫管理）</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --accent: #c8102e;
  --accent-soft: rgba(200,16,46,0.15);
  --gold: #c9a84c;
  --gold-soft: rgba(201,168,76,0.12);
  --text: #e8e8e8;
  --text-dim: #888;
  --text-label: #bbb;
  --success: #2ecc71;
  --success-bg: rgba(46,204,113,0.12);
  --warning: #e67e22;
  --warning-bg: rgba(230,126,34,0.12);
  --danger: #e74c3c;
  --danger-bg: rgba(231,76,60,0.12);
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans Khmer', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ヘッダー */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.logo {
  width: 40px; height: 40px;
  background: var(--accent); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff; flex-shrink: 0;
}
.header h1 { font-size: 15px; letter-spacing: 0.5px; }
.header p { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

/* コンテナ */
.container { padding: 12px 16px 100px; max-width: 480px; margin: 0 auto; }

/* セクションタイトル */
.section-title {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 600; color: var(--gold);
}

/* 在庫カード */
.inventory-list { display: flex; flex-direction: column; gap: 8px; }

.inv-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  transition: border-color 0.2s;
}
.inv-card.low { border-color: var(--warning); }
.inv-card.critical { border-color: var(--danger); }

.inv-card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.inv-name { font-size: 15px; font-weight: 600; }
.inv-name .jp { font-size: 11px; font-weight: 400; color: var(--text-dim); margin-left: 4px; }
.inv-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; text-transform: uppercase;
}
.inv-badge.ok { background: var(--success-bg); color: var(--success); }
.inv-badge.low { background: var(--warning-bg); color: var(--warning); }
.inv-badge.critical { background: var(--danger-bg); color: var(--danger); }

.inv-card-body {
  display: flex; justify-content: space-between; align-items: center;
}
.inv-stock {
  font-size: 28px; font-weight: 700; color: var(--gold);
}
.inv-stock .unit { font-size: 13px; font-weight: 400; color: var(--text-dim); margin-left: 2px; }
.inv-threshold { font-size: 11px; color: var(--text-dim); }

.inv-actions {
  display: flex; gap: 6px;
}
.inv-btn {
  width: 40px; height: 40px;
  border-radius: 10px; border: none;
  font-size: 20px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.inv-btn:active { transform: scale(0.95); }
.inv-btn.minus { background: var(--accent-soft); color: var(--accent); }
.inv-btn.plus { background: var(--success-bg); color: var(--success); }

/* 追加ボタン */
.add-btn {
  width: 100%; padding: 14px;
  background: var(--card); border: 1.5px dashed var(--border);
  border-radius: var(--radius); color: var(--text-dim);
  font-size: 14px; font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: border-color 0.2s;
  margin-top: 12px;
}
.add-btn:hover { border-color: var(--gold); color: var(--gold); }

/* モーダル */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border-radius: 20px;
  padding: 24px 20px; width: 100%; max-width: 340px;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--gold); }
.modal .field { margin-bottom: 12px; }
.modal .field label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text-label); margin-bottom: 5px;
}
.modal .field label .jp { font-size: 11px; font-weight: 400; color: var(--text-dim); margin-left: 3px; }
.modal .field input, .modal .field select {
  width: 100%; padding: 10px 12px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 15px; font-family: inherit;
}
.modal .field input:focus, .modal .field select:focus { outline: none; border-color: var(--gold); }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; }
.modal-btns button {
  flex: 1; padding: 12px; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
}
.modal-btns .cancel { background: var(--border); color: var(--text); }
.modal-btns .confirm { background: var(--gold); color: #000; }

/* トースト */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 20px;
  border-radius: 8px; font-size: 14px; z-index: 999;
  opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

/* 最終更新 */
.last-updated {
  text-align: center; font-size: 11px; color: var(--text-dim);
  margin-top: 16px; padding: 8px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">侍</div>
  <div>
    <h1>SAMURAI MOTORS</h1>
    <p>ស្តុកទំនិញ（在庫管理）</p>
  </div>
</div>

<div class="container">
  <div class="section-title">📦 បញ្ជីស្តុក（在庫一覧）</div>
  <div class="inventory-list" id="inventoryList"></div>
  <button class="add-btn" onclick="openAddModal()">＋ បន្ថែមផលិតផល（品目を追加）</button>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<!-- 品目追加モーダル -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>＋ បន្ថែមផលិតផល（品目追加）</h3>
    <div class="field">
      <label>ឈ្មោះផលិតផល <span class="jp">（品名）</span></label>
      <input type="text" id="addName" placeholder="ឧ. សាប៊ូលាងឡាន">
    </div>
    <div class="field">
      <label>ប្រភេទ <span class="jp">（カテゴリ）</span></label>
      <select id="addCategory">
        <option value="រាវ（液体）">រាវ（液体）</option>
        <option value="ក្រណាត់（布）">ក្រណាត់（布）</option>
        <option value="ឧបករណ៍（道具）">ឧបករណ៍（道具）</option>
      </select>
    </div>
    <div class="field">
      <label>ចំនួន <span class="jp">（数量）</span></label>
      <input type="number" id="addQty" min="0" value="0">
    </div>
    <div class="field">
      <label>ឯកតា <span class="jp">（単位）</span></label>
      <select id="addUnit">
        <option value="ដប（本）">ដប（本）</option>
        <option value="សន្លឹក（枚）">សន្លឹក（枚）</option>
        <option value="ដុំ（個）">ដុំ（個）</option>
      </select>
    </div>
    <div class="field">
      <label>កម្រិតព្រមាន <span class="jp">（発注閾値）</span></label>
      <input type="number" id="addThreshold" min="0" value="3">
    </div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeAddModal()">បោះបង់（キャンセル）</button>
      <button class="confirm" onclick="addItem()">បន្ថែម（追加）</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJfqfid10yT_gRxzUb01qoN_RUVr6AcMuKzVpE7w3_cZoDKNewnBjKO4DO96LPA1hh/exec';

// ===== STATE =====
var inventory = [];
var isLoading = false;

// ===== GAS通信 =====
function gasPost(data) {
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  });
}

function gasGet(action) {
  return fetch(APPS_SCRIPT_URL + '?action=' + action)
    .then(function(res) { return res.json(); });
}

// ===== サーバーから在庫を読み込み =====
function loadInventory() {
  isLoading = true;
  renderLoading();

  gasGet('inventory')
    .then(function(res) {
      if (res.status === 'ok' && res.items) {
        inventory = res.items;
        saveToLocal();
      } else {
        loadFromLocal();
      }
    })
    .catch(function() {
      // オフライン時はローカルから読み込み
      loadFromLocal();
      showToast('⚡ オフライン（ローカルデータ表示中）');
    })
    .finally(function() {
      isLoading = false;
      renderInventory();
    });
}

// ===== 描画 =====
function renderLoading() {
  document.getElementById('inventoryList').innerHTML =
    '<div style="text-align:center;padding:40px;color:var(--text-dim);">⏳ កំពុងផ្ទុក...（読み込み中...）</div>';
}

function renderInventory() {
  var list = document.getElementById('inventoryList');
  var html = '';

  if (inventory.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">មិនមានទិន្នន័យ（データなし）</div>';
    return;
  }

  inventory.forEach(function(item) {
    var qty = Number(item.qty) || 0;
    var threshold = Number(item.threshold) || 0;
    var status = 'ok';
    var statusLabel = 'គ្រប់គ្រាន់（十分）';
    if (qty <= 0) {
      status = 'critical';
      statusLabel = 'អស់ស្តុក（在庫切れ）';
    } else if (qty <= threshold) {
      status = qty <= Math.floor(threshold / 2) ? 'critical' : 'low';
      statusLabel = status === 'critical' ? 'ប្រកាសណាស់（危険）' : 'ទាប（少）';
    }

    // IDをエスケープしてonclickに渡す
    var escapedId = item.id.replace(/'/g, "\\'");

    html += '<div class="inv-card ' + status + '">';
    html += '  <div class="inv-card-header">';
    html += '    <div class="inv-name">' + escapeHtml(item.name) + '</div>';
    html += '    <span class="inv-badge ' + status + '">' + statusLabel + '</span>';
    html += '  </div>';
    html += '  <div class="inv-card-body">';
    html += '    <div>';
    html += '      <div class="inv-stock">' + qty + '<span class="unit">' + escapeHtml(item.unit) + '</span></div>';
    html += '      <div class="inv-threshold">កម្រិតព្រមាន（閾値）: ' + threshold + '</div>';
    html += '    </div>';
    html += '    <div class="inv-actions">';
    html += '      <button class="inv-btn minus" onclick="adjustQty(\'' + escapedId + '\', -1)">−</button>';
    html += '      <button class="inv-btn plus" onclick="adjustQty(\'' + escapedId + '\', 1)">＋</button>';
    html += '    </div>';
    html += '  </div>';
    html += '</div>';
  });

  list.innerHTML = html;
  document.getElementById('lastUpdated').textContent =
    'កែប្រែចុងក្រោយ（最終更新）: ' + new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Phnom_Penh' });
}

// ===== 数量変更 =====
function adjustQty(id, delta) {
  var item = inventory.find(function(i) { return i.id === id; });
  if (!item) return;

  var currentQty = Number(item.qty) || 0;
  var newQty = currentQty + delta;
  if (newQty < 0) {
    showToast('ស្តុកអស់ហើយ（在庫が0以下にはできません）');
    return;
  }

  // UIを即座に更新（楽観的更新）
  item.qty = newQty;
  renderInventory();
  saveToLocal();

  // サーバーに送信
  gasPost({ action: 'inventory_update', itemId: id, delta: delta })
    .catch(function() {
      showToast('⚡ オフライン（ローカル保存済み）');
    });

  // 閾値アラート
  var threshold = Number(item.threshold) || 0;
  if (delta < 0 && newQty <= threshold && newQty > 0) {
    showToast('⚠ ' + item.name + ' ស្តុកទាប！（在庫少！残り' + newQty + '）');
  } else if (delta < 0 && newQty <= 0) {
    showToast('🚨 ' + item.name + ' អស់ស្តុក！（在庫切れ！）');
  }
}

// ===== 品目追加 =====
function openAddModal() {
  document.getElementById('addModal').classList.add('show');
  document.getElementById('addName').value = '';
  document.getElementById('addQty').value = '0';
  document.getElementById('addThreshold').value = '3';
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
}

function addItem() {
  var name = document.getElementById('addName').value.trim();
  if (!name) { showToast('ឈ្មោះផលិតផល（品名）を入力してください'); return; }

  var newItem = {
    name: name,
    category: document.getElementById('addCategory').value,
    qty: parseInt(document.getElementById('addQty').value) || 0,
    unit: document.getElementById('addUnit').value,
    threshold: parseInt(document.getElementById('addThreshold').value) || 3
  };

  // サーバーに送信
  gasPost({
    action: 'inventory_add',
    name: newItem.name,
    category: newItem.category,
    qty: newItem.qty,
    unit: newItem.unit,
    threshold: newItem.threshold
  })
  .then(function() {
    showToast('✅ បានបន្ថែម（追加しました）');
    // サーバーから最新データを再取得
    loadInventory();
  })
  .catch(function() {
    // オフライン時はローカルに仮追加
    newItem.id = 'LOCAL-' + Date.now();
    inventory.push(newItem);
    renderInventory();
    saveToLocal();
    showToast('⚡ オフライン保存（次回接続時に同期）');
  });

  closeAddModal();
}

// ===== ローカル保存（オフラインバックアップ） =====
function saveToLocal() {
  try {
    localStorage.setItem('samurai_inventory', JSON.stringify(inventory));
  } catch (e) {}
}

function loadFromLocal() {
  try {
    var saved = localStorage.getItem('samurai_inventory');
    if (saved) {
      inventory = JSON.parse(saved);
    }
  } catch (e) {}
}

// ===== ユーティリティ =====
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', function() {
  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
  loadInventory();
});
</script>
</body>
</html>
